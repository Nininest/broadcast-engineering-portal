<!DOCTYPE html>
<html>
<head>
    <title>Dependency Graph</title>

    <style>
        body{
            font-family:Arial;
            padding:30px;
            background:#eef2f3;
        }

        .graph-box{
            background:white;
            padding:20px;
            border-radius:10px;
        }

        .department{
            padding:10px;
            margin:10px 0;
            border-left:5px solid blue;
            background:#f9f9f9;
        }
    </style>
</head>

<body>

<h1>Global Dependency Graph</h1>

<div class="graph-box">

    {% for department in departments %}

    <div class="department">

        <h3>{{ department.name }}</h3>

        <p>
            Connected Teams:
            {{ department.total_teams }}
        </p>

        <p>
            Manager:
            {{ department.manager }}
        </p>

    </div>

    {% endfor %}

</div>

</body>
</html>
